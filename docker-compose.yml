services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${AGENT_PORT:-9100}:${AGENT_PORT:-9100}"
    environment:
      - AGENT_ID=${AGENT_ID}
      - AGENT_PORT=${AGENT_PORT:-9100}
      - REGISTRY_URL=${REGISTRY_URL}
      - LITELLM_URL=${LITELLM_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - PHOENIX_URL=${PHOENIX_URL}
      - PHOENIX_ENDPOINT=${PHOENIX_ENDPOINT}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY}
      - PHOENIX_PROMPT_NAME=${PHOENIX_PROMPT_NAME}
      - PHOENIX_PROMPT_TAG=${PHOENIX_PROMPT_TAG}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-${PHOENIX_ENDPOINT}/v1/traces}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./src:/app/src
      - ./prompts:/app/prompts
